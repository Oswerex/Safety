<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Work Permit Application</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 24px;
    }
    h2 { margin-bottom: 16px; }
    form {
      background: #fff;
      padding: 20px;
      max-width: 720px;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    .row { display: flex; gap: 12px; }
    .row div { flex: 1; }
    button {
      margin-top: 18px;
      padding: 12px;
      width: 100%;
      background: #0d6efd;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }
    .ok { background: #d1e7dd; color: #0f5132; }
    .err { background: #f8d7da; color: #842029; }
  </style>
</head>

<body>

<h2>Work Permit Application</h2>

<form id="permitForm">

  <label>Employee Name</label>
  <input name="employeeName" required>

  <label>Employee Email</label>
  <input name="employeeEmail" type="email" required>

  <div class="row">
    <div>
      <label>Company</label>
      <input name="company" required>
    </div>
    <div>
      <label>Contractor</label>
      <input name="contractor" required>
    </div>
  </div>

  <label>Activity</label>
  <select name="activity" required>
    <option value="">Select Activity</option>
    <option>Hot Work</option>
    <option>Confined Space</option>
    <option>Working at Height</option>
    <option>Electrical Work</option>
    <option>Excavation</option>
    <option>Heavy Equipment Lifting</option>
    <option>Painting</option>
    <option>Cleaning</option>
    <option>Inspection</option>
  </select>

  <label>Location</label>
  <input name="location" required>

  <div class="row">
    <div>
      <label>Start Date</label>
      <input name="startDate" type="date" required>
    </div>
    <div>
      <label>End Date</label>
      <input name="endDate" type="date" required>
    </div>
  </div>

  <button id="submitBtn">Submit Application</button>

  <div id="okMsg" class="msg ok"></div>
  <div id="errMsg" class="msg err"></div>

</form>

<script>
const WEB_APP_URL =
  "https://script.google.com/macros/s/AKfycbyu1kcxywka4Djw_oaqItx2msA2ew99dGoH-vSkjapdt1Ej1hUbc2DztC_0IgeQaHvOvg/exec";

const form = document.getElementById("permitForm");
const btn = document.getElementById("submitBtn");
const okMsg = document.getElementById("okMsg");
const errMsg = document.getElementById("errMsg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  btn.disabled = true;

  okMsg.style.display = "none";
  errMsg.style.display = "none";

  const formData = new FormData(form);
  formData.append("action", "submitPermit");

  try {
    await fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",   // ✅ FIX FOR GITHUB PAGES
      body: formData
    });

    okMsg.textContent =
      "✅ Work Permit submitted successfully. Safety Orientation is required.";
    okMsg.style.display = "block";

    form.reset();
  } catch (err) {
    errMsg.textContent = "❌ Submission failed. Please try again.";
    errMsg.style.display = "block";
  } finally {
    btn.disabled = false;
  }
});
</script>

</body>
</html>
