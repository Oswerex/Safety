
<!DOCTYPE html>
<html>
<head>
  <title>Work Permit Application</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    input, select { width: 100%; padding: 8px; margin: 8px 0; }
    button { padding: 10px 20px; background: #007bff; color: #fff; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h2>Work Permit Application</h2>
  <form id="permitForm">
    <label>Employee Name:</label>
    <input type="text" id="employeeName" required>
    
    <label>Employee Email:</label>
    <input type="email" id="employeeEmail" required>
    
    <label>Company:</label>
    <input type="text" id="company" required>
    
    <label>Contractor:</label>
    <input type="text" id="contractor" required>
    
    <label>Activity:</label>
    <select id="activity" required>
      <option value="">Select Activity</option>
      <option>Hot Work</option>
      <option>Confined Space</option>
      <option>Working at Height</option>
      <option>Electrical Work</option>
      <option>Excavation</option>
      <option>Heavy Equipment Lifting</option>
      <option>Painting</option>
      <option>Cleaning</option>
      <option>Inspection</option>
    </select>
    
    <label>Location:</label>
    <input type="text" id="location" required>
    
    <label>Start Date:</label>
    <input type="date" id="startDate" required>
    
    <label>End Date:</label>
    <input type="date" id="endDate" required>
    
    <button type="submit">Submit</button>
  </form>

  <script>
    document.getElementById('permitForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = {
        employeeName: document.getElementById('employeeName').value,
        employeeEmail: document.getElementById('employeeEmail').value,
        company: document.getElementById('company').value,
        contractor: document.getElementById('contractor').value,
        activity: document.getElementById('activity').value,
        location: document.getElementById('location').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value
      };

      fetch('YOUR_GOOGLE_SCRIPT_WEB_APP_URL', {
        method: 'POST',
        body: JSON.stringify(data)
      }).then(response => alert('Work Permit Submitted!'));
    });
  </script>
</body>
</html>
