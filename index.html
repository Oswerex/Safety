<!DOCTYPE html>
<html lang="fil">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Safety Training with Assessment</title>

<style>
    :root {
        --primary:#0b5fff;
        --card-bg:#ffffffcc;
    }
    body {
        background: linear-gradient(135deg,#0b5fff33,#ffffff);
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
    }
    .container { max-width: 900px; margin: auto; }
    .card {
        background: var(--card-bg);
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 3px 12px rgba(0,0,0,0.12);
        margin-top: 20px;
    }
    .hidden { display:none; }
    .btn {
        padding: 10px 16px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-weight:600;
        background:#0b5fff;
        color:#fff;
    }
    .btn-muted {
        background:#e5e5e5;
        color:#333;
    }
    input[type="text"] {
        padding: 8px;
        border-radius: 6px;
        width: 250px;
        border:1px solid #ccc;
    }
    .video-container {
        position: relative; width:100%; padding-top:56.25%;
    }
    .video-container video {
        position:absolute; top:0; left:0;
        width:100%; height:100%;
        border-radius:10px;
    }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">

<h2>Safety Training Module</h2>

<!-- VIDEO -->
<div class="card">
    <h3>Watch the Safety Orientation Video</h3>
    <div class="video-container">
        <video id="trainingVideo" controls>
            <source src="https://oxwcrrgwbblxfozvqbmm.supabase.co/storage/v1/object/public/training%20videos/safety%20video.mp4">
        </video>
    </div>
    <label>
        <input type="checkbox" id="watchedChk" disabled>
        I confirm that I watched the video.
    </label>
</div>

<div class="card">
    <button id="startBtn" class="btn" disabled>Start Assessment</button>
</div>

<!-- ASSESSMENT -->
<div id="assessment" class="card hidden">
    <h3>Assessment</h3>

    <!-- QUESTION 3 ONLY CHANGED -->
    <p><b>3. Which procedure should be followed when using a fire extinguisher?</b></p>
    <label>
        <input type="radio" name="q3" value="PASS">
        <b>P.A.S.S</b> – Pull the Pin, Aim the Nozzle, Squeeze the Lever, Sweep Side to Side
    </label><br>
    <label><input type="radio" name="q3" value="TAB"> T.A.B</label><br>
    <label><input type="radio" name="q3" value="SOP"> S.O.P</label><br>
    <label><input type="radio" name="q3" value="None"> None of the above</label>

    <br><br>
    <label>Name of Trainee:</label><br>
    <input type="text" id="traineeName">

    <br><br>
    <button id="submitBtn" class="btn">Submit</button>
</div>

</div>

<script>
// SAME FLOW – NO OTHER LOGIC TOUCHED
const watchedChk=document.getElementById('watchedChk');
const startBtn=document.getElementById('startBtn');
const assessment=document.getElementById('assessment');
const trainingVideo=document.getElementById('trainingVideo');

trainingVideo.addEventListener('ended',()=>watchedChk.disabled=false);
watchedChk.addEventListener('change',()=>startBtn.disabled=!watchedChk.checked);
startBtn.addEventListener('click',()=>assessment.classList.remove('hidden'));

document.getElementById('submitBtn').addEventListener('click',()=>{
    const ans=document.querySelector('input[name="q3"]:checked')?.value;
    const name=document.getElementById('traineeName').value.trim();
    if(ans==="PASS" && name) generateCertificate(name);
    else alert("Please answer correctly and enter your name.");
});

// CERTIFICATE – LOGO LARGER ONLY
function generateCertificate(name){
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:"pt",format:"a4"});

    // ORANGE HEADER
    doc.setFillColor(255,140,0);
    doc.rect(0,0,595,90,'F');

    // BIGGER LOGO
    const img=new Image();
    img.src="https://raw.githubusercontent.com/Oswerex/ESH/6acfa4af336cce3696a01fea102eeaa626a67e01/ESHM%20Logo.png";
    img.onload=()=>{
        doc.addImage(img,'PNG',210,10,180,70);

        doc.setFontSize(26);
        doc.text("Certificate of Completion",300,140,{align:"center"});
        doc.setFontSize(18);
        doc.text(`This Certifies that: ${name}`,300,200,{align:"center"});
        doc.setFontSize(14);
        doc.text("Successfully completed the Safety Training Assessment",300,240,{align:"center"});

        doc.save(`Certificate_${name}.pdf`);
    }
}
</script>

</body>
</html>
