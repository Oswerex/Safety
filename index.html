<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Work Permit Application</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  padding: 40px;
}
.container {
  max-width: 600px;
  background: #fff;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 4px 12px rgba(0,0,0,.1);
}
label {
  font-weight: bold;
  display: block;
  margin-top: 15px;
}
input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
}
button {
  margin-top: 25px;
  background: #0d6efd;
  color: white;
  border: none;
  cursor: pointer;
}
.success {
  margin-top: 20px;
  padding: 12px;
  background: #d1e7dd;
  color: #0f5132;
  display: none;
}
</style>
</head>

<body>

<div class="container">
<h2>Work Permit Application</h2>

<label>Employee Name</label>
<input id="name">

<label>Email</label>
<input id="email">

<label>Company</label>
<input id="company">

<label>Contractor</label>
<input id="contractor">

<label>Activity</label>
<select id="activity">
  <option value="">Select Activity</option>
  <option>Hot Work</option>
  <option>Confined Space</option>
  <option>Working at Height</option>
  <option>Electrical Work</option>
</select>

<label>Location</label>
<input id="location">

<label>Start Date</label>
<input type="date" id="start">

<label>End Date</label>
<input type="date" id="end">

<button onclick="submitForm()">Submit Application</button>

<div class="success" id="successMsg">
✅ Work Permit submitted. Please proceed to Safety Orientation.
</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyu1kcxywka4Djw_oaqItx2msA2ew99dGoH-vSkjapdt1Ej1hUbc2DztC_0IgeQaHvOvg/exec";

function submitForm() {

  const payload = {
    employeeName: document.getElementById("name").value,
    employeeEmail: document.getElementById("email").value,
    company: document.getElementById("company").value,
    contractor: document.getElementById("contractor").value,
    activity: document.getElementById("activity").value,
    location: document.getElementById("location").value,
    startDate: document.getElementById("start").value,
    endDate: document.getElementById("end").value
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });

  document.getElementById("successMsg").style.display = "block";
}
</script>

</body>
</html>
